<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تِش · كأس العالم 2026 — أهم المباريات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rakkas&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05110e;--bg2:#072019;--panel:#0a241d;--panel-edge:#15463a;
    --gold:#cdab57;--gold-soft:#ecd79c;--teal:#2c6b6b;--teal-soft:#5aa6a3;
    --ksa:#1ec46a;--ink:#eafff4;--muted:#86b0a4;--line:rgba(205,171,87,.18);
    --shadow:0 18px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Tajawal','Cairo',sans-serif}
  body{min-height:100vh;background:
      radial-gradient(1200px 600px at 50% -10%, rgba(44,107,107,.30), transparent 60%),
      radial-gradient(900px 500px at 85% 0%, rgba(205,171,87,.12), transparent 55%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 55%, var(--bg) 100%);
      background-attachment:fixed;padding:0 0 50px;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(180deg,transparent 0 38px,rgba(255,255,255,.012) 38px 39px);mix-blend-mode:overlay}
  .wrap{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 28px}
  .motif{height:26px;width:auto;display:block;margin:0 auto;filter:drop-shadow(0 2px 6px rgba(205,171,87,.35))}
  .divider{display:flex;align-items:center;justify-content:center;gap:18px;margin:22px auto;max-width:520px}
  .divider .ln{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold))}
  .divider .ln.r{background:linear-gradient(270deg,transparent,var(--gold))}

  header.hero{text-align:center;padding:34px 20px 8px;position:relative}
  .brand-badge{display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff,#f6f4ee);
    border-radius:26px;padding:16px 30px;margin:0 auto 8px;
    box-shadow:0 12px 38px rgba(0,0,0,.5),0 0 0 1.5px rgba(205,171,87,.6),inset 0 0 0 6px rgba(255,255,255,.6)}
  .brand-badge img{height:78px;width:auto;display:block}
  .present{font-family:'Tajawal';font-weight:700;font-size:12px;letter-spacing:4px;color:var(--muted);margin:6px 0 14px}
  .kicker{font-family:'Tajawal';font-weight:800;letter-spacing:6px;font-size:13px;color:var(--gold);text-transform:uppercase;opacity:.92;margin-bottom:4px}
  .hero h1{font-family:'Rakkas',serif;font-weight:400;line-height:.95;font-size:clamp(46px,6.5vw,96px);
    background:linear-gradient(180deg,#fff 0%,var(--gold-soft) 55%,var(--gold) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 6px 24px rgba(205,171,87,.25))}

  .slogan{margin:18px auto 4px}
  .slogan .main{font-family:'Rakkas',serif;font-size:clamp(34px,5vw,62px);line-height:1;
    background:linear-gradient(180deg,#7ef0ad,var(--ksa) 60%,#0c8a45);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 18px rgba(30,196,106,.3))}
  .slogan .sub2{margin-top:12px;font-family:'Cairo';font-weight:900;font-size:clamp(18px,2.3vw,28px);color:var(--gold-soft)}
  .slogan .sub2 b{color:var(--teal-soft);font-weight:900}
  .hero .meta-line{margin-top:14px;font-size:clamp(14px,1.5vw,18px);font-weight:700;color:var(--ink)}
  .hero .meta-line b{color:var(--teal-soft)}
  .hero .host{margin-top:4px;color:var(--muted);font-size:14px;font-weight:500}

  .legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:22px 0 6px}
  .lg{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;background:rgba(255,255,255,.04);border:1px solid var(--line);padding:7px 14px;border-radius:999px}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.ksa{background:var(--ksa);box-shadow:0 0 12px var(--ksa)}.dot.top{background:var(--gold)}.dot.arab{background:var(--teal-soft)}

  .feature-title{text-align:center;margin:30px 0 16px;font-family:'Cairo';font-weight:900;font-size:clamp(22px,3vw,34px)}
  .feature-title span{color:var(--ksa)}
  .ksa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .ksa-card{position:relative;border-radius:20px;padding:26px 20px;text-align:center;overflow:hidden;
    background:linear-gradient(160deg,rgba(30,196,106,.16),rgba(12,138,69,.05));
    border:1.5px solid rgba(30,196,106,.45);box-shadow:0 0 0 1px rgba(30,196,106,.08),var(--shadow)}
  .ksa-card::after{content:"";position:absolute;inset:0;border-radius:20px;background:radial-gradient(400px 160px at 50% -20%,rgba(30,196,106,.32),transparent 70%);pointer-events:none}
  .ksa-card .tag{font-family:'Tajawal';font-weight:800;font-size:12px;letter-spacing:2px;color:var(--ksa);text-transform:uppercase;position:relative;z-index:1}
  .ksa-card .vs{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px 0 4px;font-family:'Cairo';font-weight:900;font-size:clamp(19px,2.2vw,27px);position:relative;z-index:1;flex-wrap:nowrap}
  .ksa-card .vs .fl{font-size:1.4em;line-height:1}
  .ksa-card .vs em{color:var(--gold);font-style:normal;font-size:.55em;font-weight:700;margin:0 2px}
  .ksa-card .when{margin-top:12px;font-weight:800;font-size:clamp(15px,1.7vw,20px);color:#fff;position:relative;z-index:1}
  .ksa-card .when b{color:var(--ksa);font-size:1.3em;display:block;margin-top:2px}
  .ksa-card .meta{margin-top:8px;color:var(--muted);font-size:12.5px;font-weight:600;position:relative;z-index:1}

  .days{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;margin-top:28px}
  .day{background:linear-gradient(180deg,var(--panel),rgba(6,18,14,.7));border:1px solid var(--panel-edge);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .day.is-today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(205,171,87,.4),var(--shadow)}
  .day-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:14px 18px;background:linear-gradient(90deg,rgba(44,107,107,.22),transparent);border-bottom:1px solid var(--line)}
  .day-head .dname{font-family:'Cairo';font-weight:900;font-size:19px}
  .day-head .ddate{color:var(--gold);font-weight:700;font-size:14px}
  .today-pill{font-size:11px;font-weight:800;background:var(--gold);color:#1a1205;padding:2px 9px;border-radius:999px;letter-spacing:1px;margin-inline-start:8px}
  .matches{padding:8px 10px 12px;display:flex;flex-direction:column}
  .m{display:grid;grid-template-columns:56px 1fr;align-items:center;gap:12px;padding:11px 10px;border-radius:12px;transition:background .2s}
  .m + .m{border-top:1px solid rgba(255,255,255,.045)}
  .m:hover{background:rgba(255,255,255,.03)}
  .m .time{font-family:'Tajawal';font-weight:800;font-size:15px;color:var(--gold-soft);text-align:center;line-height:1.15}
  .m .time small{display:block;font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap}
  .m .info{min-width:0;display:flex;flex-direction:column;gap:3px}
  .m .teams{font-family:'Cairo';font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .m .teams .fl{font-size:19px;line-height:1}
  .m .teams .fl svg{width:23px;height:15px;border-radius:2px;vertical-align:-2px;box-shadow:0 0 0 1px rgba(255,255,255,.18)}
  .m .teams .x{color:var(--muted);font-weight:700;font-size:13px;margin:0 1px}
  .m .teams .mk{margin-inline-start:auto;font-size:14px;padding-inline-start:6px}
  .m .note{font-size:11.5px;color:var(--muted);font-weight:600}
  .m.ksa{background:linear-gradient(90deg,rgba(30,196,106,.20),rgba(30,196,106,.03));box-shadow:inset 3px 0 0 var(--ksa)}
  .m.ksa .time{color:#bdfcd8}.m.ksa .teams{color:#fff;font-weight:900}
  .mk.star{color:var(--gold)}.mk.kstar{color:var(--ksa)}.mk.cres{color:var(--teal-soft)}

  .signoff{margin-top:40px;text-align:center}
  .signoff .chip{display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff,#f6f4ee);border-radius:18px;padding:10px 18px;box-shadow:0 8px 26px rgba(0,0,0,.4),0 0 0 1px rgba(205,171,87,.5)}
  .signoff .chip img{height:42px;display:block}
  .signoff .tag{margin-top:14px;font-family:'Rakkas',serif;font-size:clamp(20px,2.6vw,30px);color:var(--ksa)}
  .signoff .tag2{margin-top:4px;font-family:'Cairo';font-weight:800;font-size:14px;color:var(--gold-soft);letter-spacing:1px}

  @media print{body{background:#fff;color:#111}.day,.ksa-card,.brand-badge,.signoff .chip{box-shadow:none}.hero h1{-webkit-text-fill-color:#0c8a45}}
  @media (max-width:760px){.ksa-grid{grid-template-columns:1fr}.days{grid-template-columns:1fr}}
</style>
</head>

function period(t){if(t==='12:00ص')return['12:00','منتصف الليل'];
  const num=t.replace(/[فمص]$/,''),s=t.slice(-1);
  return [num, s==='ف'?'فجراً':s==='ص'?'صباحاً':s==='م'?'مساءً':''];}
