<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تِش · كأس العالم 2026 — أهم المباريات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rakkas&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05110e;--bg2:#072019;--panel:#0a241d;--panel-edge:#15463a;
    --gold:#cdab57;--gold-soft:#ecd79c;--teal:#2c6b6b;--teal-soft:#5aa6a3;
    --ksa:#1ec46a;--ink:#eafff4;--muted:#86b0a4;--line:rgba(205,171,87,.18);
    --shadow:0 18px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Tajawal','Cairo',sans-serif}
  body{min-height:100vh;background:
      radial-gradient(1200px 600px at 50% -10%, rgba(44,107,107,.30), transparent 60%),
      radial-gradient(900px 500px at 85% 0%, rgba(205,171,87,.12), transparent 55%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 55%, var(--bg) 100%);
      background-attachment:fixed;padding:0 0 50px;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(180deg,transparent 0 38px,rgba(255,255,255,.012) 38px 39px);mix-blend-mode:overlay}
  .wrap{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 28px}
  .motif{height:26px;width:auto;display:block;margin:0 auto;filter:drop-shadow(0 2px 6px rgba(205,171,87,.35))}
  .divider{display:flex;align-items:center;justify-content:center;gap:18px;margin:22px auto;max-width:520px}
  .divider .ln{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold))}
  .divider .ln.r{background:linear-gradient(270deg,transparent,var(--gold))}

  header.hero{margin:0;padding:0;position:relative;line-height:0;overflow:hidden}
  .hero-img{width:100%;height:auto;display:block}
  header.hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:22%;pointer-events:none;
    background:linear-gradient(180deg,transparent 0%,rgba(5,17,14,.4) 55%,var(--bg) 100%)}
  header.hero::before{content:"";position:absolute;left:0;right:0;bottom:0;height:1.5px;z-index:2;pointer-events:none;
    background:linear-gradient(90deg,transparent 0%,var(--gold) 50%,transparent 100%);
    box-shadow:0 0 14px rgba(205,171,87,.45)}
  .brand-badge{display:inline-block;margin:0 auto 8px;}
  .brand-badge img{height: 140px; width: auto; display: block;}
  .present{font-family:'Tajawal';font-weight:700;font-size:12px;letter-spacing:4px;color:var(--muted);margin:6px 0 14px}
  .kicker{font-family:'Tajawal';font-weight:800;letter-spacing:6px;font-size:13px;color:var(--gold);text-transform:uppercase;opacity:.92;margin-bottom:4px}
  .hero h1{font-family:'Rakkas',serif;font-weight:400;line-height:1.18;padding:0.1em 0;font-size:clamp(46px,6.5vw,96px);
    background:linear-gradient(180deg,#fff 0%,var(--gold-soft) 55%,var(--gold) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 6px 24px rgba(205,171,87,.25))}

  .slogan{margin:18px auto 4px}
  .slogan .main{font-family:'Rakkas',serif;font-size:clamp(34px,5vw,62px);line-height:1.25;padding:0.12em 0;
    background:linear-gradient(180deg,#7ef0ad,var(--ksa) 60%,#0c8a45);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 18px rgba(30,196,106,.3))}
  .slogan .sub2{margin-top:12px;font-family:'Cairo';font-weight:900;font-size:clamp(18px,2.3vw,28px);color:var(--gold-soft)}
  .slogan .sub2 b{color:var(--teal-soft);font-weight:900}
  .hero .meta-line{margin-top:14px;font-size:clamp(14px,1.5vw,18px);font-weight:700;color:var(--ink)}
  .hero .meta-line b{color:var(--teal-soft)}
  .hero .host{margin-top:4px;color:var(--muted);font-size:14px;font-weight:500}

  .legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:22px 0 6px}
  .lg{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;background:rgba(255,255,255,.04);border:1px solid var(--line);padding:7px 14px;border-radius:999px}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.ksa{background:var(--ksa);box-shadow:0 0 12px var(--ksa)}.dot.top{background:var(--gold)}.dot.arab{background:var(--teal-soft)}

  .feature-title{text-align:center;margin:30px 0 16px;font-family:'Cairo';font-weight:900;font-size:clamp(22px,3vw,34px)}
  .feature-title span{color:var(--ksa)}

  /* Booking CTA */
  .cta-wrap{display:flex;justify-content:center;margin:36px 20px 10px}
  .cta-book{display:inline-flex;align-items:center;gap:10px;padding:14px 34px;border-radius:999px;
    font-family:'Cairo',sans-serif;font-weight:900;font-size:17px;
    background:linear-gradient(180deg,var(--gold),#a78a3e);color:#1a1205;text-decoration:none;
    box-shadow:0 8px 24px rgba(205,171,87,.35),0 0 0 1px rgba(205,171,87,.55);
    transition:transform .2s ease, box-shadow .2s ease;letter-spacing:.5px}
  .cta-book:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(205,171,87,.45),0 0 0 1px rgba(205,171,87,.7)}
  .cta-book svg{width:22px;height:22px;flex-shrink:0}
  .ksa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .ksa-card{position:relative;border-radius:20px;padding:26px 20px;text-align:center;overflow:hidden;
    background:linear-gradient(160deg,rgba(30,196,106,.16),rgba(12,138,69,.05));
    border:1.5px solid rgba(30,196,106,.45);box-shadow:0 0 0 1px rgba(30,196,106,.08),var(--shadow)}
  .ksa-card::after{content:"";position:absolute;inset:0;border-radius:20px;background:radial-gradient(400px 160px at 50% -20%,rgba(30,196,106,.32),transparent 70%);pointer-events:none}
  .ksa-card .tag{font-family:'Cairo','Tajawal',sans-serif;font-weight:800;font-size:13px;color:var(--ksa);position:relative;z-index:1}
  .ksa-card .vs{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px 0 4px;font-family:'Cairo';font-weight:900;font-size:clamp(19px,2.2vw,27px);position:relative;z-index:1;flex-wrap:nowrap}
  .ksa-card .vs .fl{font-size:1.4em;line-height:1}
  .ksa-card .vs em{color:var(--gold);font-style:normal;font-size:.55em;font-weight:700;margin:0 2px}
  .ksa-card .when{margin-top:12px;font-weight:800;font-size:clamp(15px,1.7vw,20px);color:#fff;position:relative;z-index:1}
  .ksa-card .when b{color:var(--ksa);font-size:1.3em;display:block;margin-top:8px}
  .ksa-card .meta{margin-top:8px;color:var(--muted);font-size:12.5px;font-weight:600;position:relative;z-index:1}

  /* Tabs */
  .tabs{display:flex;justify-content:center;margin:28px auto 6px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:999px;padding:5px;max-width:520px;gap:4px}
  .tab{flex:1;padding:11px 22px;border-radius:999px;font-family:'Cairo';font-weight:800;font-size:15px;color:var(--muted);background:transparent;border:0;cursor:pointer;transition:all .25s;font-family:'Cairo',sans-serif}
  .tab.active{background:linear-gradient(180deg,var(--gold),#a78a3e);color:#1a1205;box-shadow:0 4px 14px rgba(205,171,87,.35)}
  .tab:hover:not(.active){color:var(--gold-soft)}
  .subtabs{display:flex;justify-content:center;margin:22px auto 18px;gap:10px;max-width:420px}
  .subtab{flex:1;padding:9px 18px;border-radius:12px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;color:var(--gold-soft);background:rgba(205,171,87,.06);border:1px solid var(--line);cursor:pointer;transition:all .25s}
  .subtab.active{background:linear-gradient(180deg,rgba(44,107,107,.32),rgba(44,107,107,.10));border-color:var(--teal-soft);color:#fff;box-shadow:0 4px 14px rgba(44,107,107,.25)}
  .view{display:none}
  .view.active{display:block}

  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:.55}}

  /* Match row — 365-style grid: name | flag | center | flag | name (fixed columns so every row aligns) */
  .m{display:flex;flex-direction:column;padding:10px 8px;border-radius:12px;gap:4px;transition:background .2s;align-items:stretch;grid-template-columns:none}
  .m + .m{border-top:1px solid rgba(255,255,255,.045)}
  .m:hover{background:rgba(255,255,255,.03)}
  .m-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 2px 4px}
  .m-row{display:grid;grid-template-columns:1fr 30px 64px 30px 1fr;align-items:center;gap:6px;padding:2px 0}
  .m-side{font-family:'Cairo',sans-serif;font-weight:700;font-size:12.5px;line-height:1.2;min-width:0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;word-break:keep-all;overflow-wrap:break-word}
  .m-side.right{text-align:right}
  .m-side.left{text-align:left}
  .m-side.winner{color:#fff;font-weight:900}
  .m-flag{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.05);font-size:18px;line-height:1;flex-shrink:0}
  .m-flag svg{width:24px;height:15px;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,.15)}
  .m-center{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0}
  .m-status{font-family:'Tajawal';font-weight:800;font-size:10.5px;color:var(--muted);letter-spacing:.3px;text-align:center;white-space:nowrap}
  .m-status.live{color:#ff6b6b;animation:livePulse 1.6s ease-in-out infinite}
  .m-score{font-family:'Cairo',sans-serif;font-weight:900;font-size:17px;color:var(--gold-soft);white-space:nowrap;letter-spacing:1.5px}
  .m-score.live{color:#ff6b6b}
  .m.ksa .m-score{color:#fff}
  .m-time{font-family:'Cairo',sans-serif;font-weight:800;font-size:13.5px;color:var(--gold-soft);white-space:nowrap;text-align:center;line-height:1.2}
  .m-time small{display:block;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:1px}
  .m .note{font-size:11px;color:var(--muted);font-weight:600;padding:2px 2px 0;text-align:center}
  .m.ksa{background:linear-gradient(90deg,rgba(30,196,106,.20),rgba(30,196,106,.03));box-shadow:inset 3px 0 0 var(--ksa)}
  .m.ksa .m-side{color:#fff;font-weight:900}
  .m.ksa .m-flag{background:rgba(30,196,106,.18)}

  /* KSA highlight card — stacked layout with per-team score */
  .ksa-team-row{display:flex;align-items:center;gap:12px;padding:6px 0}
  .ksa-team-row + .ksa-team-row{border-top:1px solid rgba(255,255,255,.06)}
  .ksa-team-row .fl{font-size:28px;line-height:1;flex-shrink:0}
  .ksa-team-row .ksa-tn{flex:1;text-align:right;font-family:'Cairo',sans-serif;font-weight:900;font-size:clamp(18px,2.1vw,24px);color:#fff}
  .ksa-team-row .ksa-score{font-family:'Cairo',sans-serif;font-weight:900;font-size:clamp(22px,2.4vw,28px);color:#fff;min-width:40px;text-align:center;background:rgba(30,196,106,.22);border:1px solid rgba(30,196,106,.5);padding:4px 12px;border-radius:10px}
  .ksa-card .status-badge{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;letter-spacing:1px;margin-top:6px;font-family:'Tajawal'}
  .ksa-card .status-badge.finished{background:rgba(255,255,255,.08);color:var(--muted);border:1px solid rgba(255,255,255,.1)}
  .ksa-card .status-badge.live{background:rgba(255,107,107,.15);color:#ff6b6b;border:1px solid rgba(255,107,107,.4);animation:livePulse 1.6s ease-in-out infinite}

  /* Modal match score — color-coded by result */
  .mm-score{font-family:'Cairo';font-weight:900;font-size:18px;color:var(--gold-soft);background:rgba(205,171,87,.10);border:1px solid rgba(205,171,87,.25);padding:3px 14px;border-radius:8px;display:inline-block;margin-top:4px}
  .mm-score.win{background:rgba(30,196,106,.15);border-color:rgba(30,196,106,.5);color:#7ef0ad}
  .mm-score.loss{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.45);color:#ff8a8a}
  .mm-score.draw{background:rgba(205,171,87,.10);border-color:rgba(205,171,87,.3);color:var(--gold-soft)}
  .mm-score.live{background:rgba(255,107,107,.10);border-color:rgba(255,107,107,.3);color:#ff6b6b}
  .mm-result{display:inline-block;font-family:'Cairo';font-weight:800;font-size:12px;letter-spacing:1px;padding:2px 10px;border-radius:999px;margin-inline-start:8px;vertical-align:middle}
  .mm-result.win{color:#7ef0ad;background:rgba(30,196,106,.12);border:1px solid rgba(30,196,106,.4)}
  .mm-result.loss{color:#ff8a8a;background:rgba(255,107,107,.10);border:1px solid rgba(255,107,107,.4)}
  .mm-result.draw{color:var(--gold-soft);background:rgba(205,171,87,.10);border:1px solid rgba(205,171,87,.3)}
  .mm-status{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.5px}
  .mm-status.live{color:#ff6b6b}

  /* Standings table inside group card */
  .gt .pos{font-family:'Cairo';font-weight:900;color:var(--gold);font-size:14px;min-width:18px;text-align:center}
  .gt.is-ksa .pos{color:var(--ksa)}
  .gt .stats{margin-inline-start:auto;display:flex;align-items:center;gap:10px;font-family:'Tajawal'}
  .gt .st-meta{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.3px}
  .gt .st-pts{color:#fff;font-weight:900;font-size:15px;background:rgba(205,171,87,.14);padding:2px 11px;border-radius:8px;border:1px solid rgba(205,171,87,.35);min-width:32px;text-align:center}
  .gt.is-ksa .st-pts{background:rgba(30,196,106,.18);border-color:rgba(30,196,106,.5)}
  .group-table-head{display:grid;grid-template-columns:18px 22px 1fr auto;gap:10px;padding:6px 14px 4px;color:var(--muted);font-size:10px;font-weight:800;letter-spacing:1px;font-family:'Tajawal';border-bottom:1px solid var(--line);margin-bottom:2px}
  .group-table-head .th-pts{padding-inline-end:6px}

  /* Last updated footer */
  .updated{text-align:center;color:var(--muted);font-size:11.5px;font-weight:600;margin:14px 0 -6px;font-family:'Tajawal';letter-spacing:.3px}

  /* Hint banner */
  .hint{display:flex;align-items:center;gap:10px;justify-content:center;max-width:560px;margin:0 auto 18px;
    padding:11px 18px;border-radius:12px;background:rgba(205,171,87,.08);border:1px solid var(--line);
    color:var(--gold-soft);font-family:'Cairo',sans-serif;font-weight:700;font-size:13.5px;text-align:center}
  .hint svg{width:18px;height:18px;flex-shrink:0;color:var(--gold)}

  /* Groups */
  .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;margin-top:6px}
  .group-card{background:linear-gradient(180deg,var(--panel),rgba(6,18,14,.7));border:1px solid var(--panel-edge);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
  .group-card.has-ksa{border-color:rgba(30,196,106,.55);box-shadow:0 0 0 1px rgba(30,196,106,.18),var(--shadow)}
  .group-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:linear-gradient(90deg,rgba(44,107,107,.22),transparent);border-bottom:1px solid var(--line)}
  .group-head .gname{font-family:'Cairo';font-weight:900;font-size:17px}
  .group-head .glabel{color:var(--gold);font-family:'Rakkas',serif;font-size:26px;line-height:1}
  .group-teams{padding:6px 8px 12px;display:flex;flex-direction:column}
  .gt{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:background .2s,transform .15s;background:transparent;border:0;color:var(--ink);width:100%;text-align:right;font-family:inherit}
  .gt + .gt{border-top:1px solid rgba(255,255,255,.045)}
  .gt:hover{background:rgba(205,171,87,.08);transform:translateX(-2px)}
  .gt .fl{font-size:22px;line-height:1}
  .gt .fl svg{width:26px;height:17px;border-radius:2px;vertical-align:-3px;box-shadow:0 0 0 1px rgba(255,255,255,.18)}
  .gt .tn{font-family:'Cairo';font-weight:800;font-size:15.5px;flex:1}
  .gt .arrow{color:var(--gold);opacity:.5;font-size:14px}
  .gt:hover .arrow{opacity:1}
  .gt.is-ksa{background:linear-gradient(90deg,rgba(30,196,106,.20),rgba(30,196,106,.03));box-shadow:inset 3px 0 0 var(--ksa)}
  .gt.is-ksa .tn{color:#fff;font-weight:900}
  .gt.tbd{opacity:.4;cursor:default;pointer-events:none}

  .days{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;margin-top:14px}
  .day{background:linear-gradient(180deg,var(--panel),rgba(6,18,14,.7));border:1px solid var(--panel-edge);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .day.is-today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(205,171,87,.4),var(--shadow)}
  .day-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:14px 18px;background:linear-gradient(90deg,rgba(44,107,107,.22),transparent);border-bottom:1px solid var(--line)}
  .day-head .dname{font-family:'Cairo';font-weight:900;font-size:19px}
  .day-head .ddate{color:var(--gold);font-weight:700;font-size:14px}
  .today-pill{display:inline-block;font-size:11px;font-weight:800;background:var(--gold);color:#1a1205;padding:2px 9px;border-radius:999px;letter-spacing:1px;margin-inline-start:10px;vertical-align:middle}
  .matches{padding:8px 10px 12px;display:flex;flex-direction:column}
  .m{display:flex;flex-direction:column;align-items:stretch;gap:6px;padding:10px 12px;border-radius:12px;transition:background .2s}
  .m + .m{border-top:1px solid rgba(255,255,255,.045)}
  .m:hover{background:rgba(255,255,255,.03)}
  .m .time{font-family:'Tajawal';font-weight:800;font-size:15px;color:var(--gold-soft);text-align:center;line-height:1.15}
  .m .time small{display:block;font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap}
  .m .info{min-width:0;display:flex;flex-direction:column;gap:3px}
  .m .teams{font-family:'Cairo';font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .m .teams .fl{font-size:19px;line-height:1}
  .m .teams .fl svg{width:23px;height:15px;border-radius:2px;vertical-align:-2px;box-shadow:0 0 0 1px rgba(255,255,255,.18)}
  .m .teams .x{color:var(--muted);font-weight:700;font-size:13px;margin:0 1px}
  .m .teams .mk{margin-inline-start:auto;font-size:14px;padding-inline-start:6px}
  .m .gpill{font-size:10.5px;font-weight:800;color:var(--gold);background:rgba(205,171,87,.10);border:1px solid var(--line);padding:2px 8px;border-radius:999px;letter-spacing:1px;display:inline-block}
  .m .g-row{display:flex;justify-content:flex-start;margin-bottom:4px}
  .m .note{font-size:11.5px;color:var(--muted);font-weight:600}
  .m.ksa{background:linear-gradient(90deg,rgba(30,196,106,.20),rgba(30,196,106,.03));box-shadow:inset 3px 0 0 var(--ksa)}
  .m.ksa .time{color:#bdfcd8}.m.ksa .teams{color:#fff;font-weight:900}
  .mk.star{color:var(--gold)}.mk.kstar{color:var(--ksa)}.mk.cres{color:var(--teal-soft)}

  /* Modal */
  .modal{display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);animation:fadeIn .2s ease}
  .modal.open{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1.5px solid var(--gold);border-radius:22px;max-width:540px;width:100%;max-height:85vh;overflow:auto;box-shadow:var(--shadow);position:relative;animation:slideUp .25s ease}
  .modal-card.ksa{border-color:var(--ksa);box-shadow:0 0 0 2px rgba(30,196,106,.25),var(--shadow)}
  .modal-head{padding:26px 22px 18px;text-align:center;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(205,171,87,.10),transparent)}
  .modal-card.ksa .modal-head{background:linear-gradient(180deg,rgba(30,196,106,.14),transparent)}

/* ========= KSA highlight cards ========= */
const KSA_CARDS=[
 {tag:'الجولة 1',a:'ksa',b:'uru',day:'الثلاثاء',date:'16 يونيو',time:'1:00 فجراً',meta:'ميامي · المجموعة الثامنة'},
 {tag:'الجولة 2',a:'ksa',b:'esp',day:'الأحد',date:'21 يونيو',time:'7:00 مساءً',meta:'أتلانتا · قمة المجموعة'},
 {tag:'الجولة 3',a:'ksa',b:'cpv',day:'السبت',date:'27 يونيو',time:'3:00 فجراً',meta:'هيوستن · الجولة الحاسمة'}];

/* ========= Helpers ========= */
function flag(c){return F[c]||F.tbd;}
function tname(c){return TN[c]||'—';}
function period(t){
  if(t==='12:00ص')return['12:00','منتصف الليل'];
  const num=t.replace(/[فمص]$/,''),s=t.slice(-1);
  return [num, s==='ف'?'فجراً':s==='ص'?'صباحاً':s==='م'?'مساءً':''];
}
function timeKey(t){
  // For sorting: convert to 24h-ish key. ف=after midnight (00-06), ص=morning, م=evening
  const num=t.replace(/[فمص]$/,'');const s=t.slice(-1);
  const[h,m]=num.split(':').map(Number);
  let H=h;
  if(s==='ف')H=h===12?0:h;       // فجر: 12=midnight, 1-6 early morning
  else if(s==='ص')H=h;            // morning 6-11
  else if(s==='م')H=h<12?h+12:h;  // evening 12-11pm
  return H*60+(m||0);
}
function mkMark(tier){
  return tier==='ksa'?'<span class="mk kstar">★</span>':
         tier==='top'?'<span class="mk star">★</span>':
         tier==='arab'?'<span class="mk cres">★</span>':'';
}

/* ========= Live results (populated by fetch) ========= */
let RESULTS = { matches: {}, standings: {}, lastUpdated: null };

const LIVE_STATUSES = new Set(['IN_PLAY','PAUSED','LIVE']);
const DONE_STATUSES = new Set(['FINISHED']);

// Lookup map: "{a}_{b}" -> {status, homeScore, awayScore, minute}
// Built from RESULTS.matches regardless of whether keys include a date prefix.
let SCORE_MAP = {};
function buildScoreMap(){
  SCORE_MAP = {};
  Object.entries(RESULTS.matches || {}).forEach(([key, val])=>{
    const parts = key.split('_');
    // Use only the last two segments as team pair, so both "a_b" and "yyyy-mm-dd_a_b" work
    const pair = parts.slice(-2).join('_');
    SCORE_MAP[pair] = val;
  });
}

function resultFor(a, b){
  const fwd = SCORE_MAP[`${a}_${b}`];
  if (fwd) return { ...fwd, reversed:false };
  const rev = SCORE_MAP[`${b}_${a}`];
  if (rev) return { status:rev.status, homeScore:rev.awayScore, awayScore:rev.homeScore, minute:rev.minute, reversed:true };
  return null;
}

/* ========= Render KSA cards ========= */
const kg=document.getElementById('ksaGrid');
function renderKSACards(){
  kg.innerHTML='';
  KSA_CARDS.forEach(k=>{
    const r = resultFor(k.a, k.b);
    const isFinished = r && DONE_STATUSES.has(r.status);
    const isLive = r && LIVE_STATUSES.has(r.status);
    const showScores = isFinished || isLive;

    // Build each team row (with score box only if we have one)
    const renderTeam = (code, score) => `
      <div class="ksa-team-row">
        <span class="fl">${flag(code)}</span>
        <span class="ksa-tn">${tname(code)}</span>
        ${showScores ? `<span class="ksa-score">${score}</span>` : ''}
      </div>`;

    let badge = '';
    if (isFinished) badge = `<div class="status-badge finished">انتهت</div>`;
    else if (isLive) badge = `<div class="status-badge live">مباشر${r.minute?` · ${r.minute}'`:''}</div>`;

    kg.insertAdjacentHTML('beforeend',`
      <div class="ksa-card">
        <div class="tag">${k.tag} · الأخضر</div>
        <div style="margin:14px 0 4px">
          ${renderTeam(k.a, r ? r.homeScore : '')}
          ${renderTeam(k.b, r ? r.awayScore : '')}
        </div>
        <div class="when">${k.day} ${k.date}<b>${k.time}</b></div>
        <div class="meta">${k.meta}</div>
        ${badge}
      </div>`);
  });
}

/* ========= Render day-by-day matches ========= */
const today=new Date().toISOString().slice(0,10);

function renderDays(containerId, matches, opts){
  const showGroup = !!(opts&&opts.showGroup);
  const cont = document.getElementById(containerId);
  cont.innerHTML='';
  const byDay={};
  matches.forEach(m=>{(byDay[m.iso]=byDay[m.iso]||[]).push(m);});
  const isos = Object.keys(byDay).sort();
  isos.forEach(iso=>{
    const arr = byDay[iso].sort((x,y)=>timeKey(x.t)-timeKey(y.t));
    const day = arr[0];
    const isToday = iso===today;
    let rows='';
    arr.forEach(mt=>{
      const[num,per]=period(mt.t);
      const mk = mkMark(mt.tier);
      const r = resultFor(mt.a, mt.b);
      const isFinished = r && DONE_STATUSES.has(r.status);
      const isLive     = r && LIVE_STATUSES.has(r.status);

      // Center column: status + score (if played) OR just time
      let center;
      if (isFinished){
        center = `<div class="m-center">
          <div class="m-status">انتهت</div>
          <div class="m-score">${r.homeScore} - ${r.awayScore}</div>
        </div>`;
      } else if (isLive){
        center = `<div class="m-center">
          <div class="m-status live">مباشر${r.minute?` ${r.minute}'`:''}</div>
          <div class="m-score live">${r.homeScore} - ${r.awayScore}</div>
        </div>`;
      } else {
        center = `<div class="m-center">
          <div class="m-time">${num}<small>${per}</small></div>
        </div>`;
      }

      // Winner emphasis
      let aWin = false, bWin = false;
      if (isFinished){
        if (r.homeScore > r.awayScore) aWin = true;
        else if (r.awayScore > r.homeScore) bWin = true;
      }

      // Top meta row (group pill or star mark)
      const meta = showGroup
        ? `<span class="gpill">المجموعة ${mt.g}</span>`
        : (mk || '');
      const head = meta ? `<div class="m-head">${meta}</div>` : '';

      rows+=`<div class="m ${mt.tier}">
        ${head}
        <div class="m-row">
          <div class="m-side right${aWin?' winner':''}">${tname(mt.a)}</div>
          <div class="m-flag">${flag(mt.a)}</div>
          ${center}
          <div class="m-flag">${flag(mt.b)}</div>
          <div class="m-side left${bWin?' winner':''}">${tname(mt.b)}</div>
        </div>
        ${(!showGroup && mt.n)?`<div class="note">${mt.n}</div>`:''}
      </div>`;
    });
    cont.insertAdjacentHTML('beforeend',`<div class="day ${isToday?'is-today':''}">
      <div class="day-head"><span class="dname">${day.d}${isToday?'<span class="today-pill">اليوم</span>':''}</span><span class="ddate">${day.dt}</span></div>
      <div class="matches">${rows}</div></div>`);
  });
}

/* ========= Render Groups view ========= */
const gg=document.getElementById('groupsGrid');
function renderGroups(){
  gg.innerHTML='';
  GROUPS.forEach(G=>{
    const hasKsa = G.teams.includes('ksa');
    const standings = RESULTS.standings && RESULTS.standings[G.key];
    const hasData = standings && standings.length && standings.some(t=>t.played>0);

    let body;
    if (hasData){
      const rows = standings.map((s, i)=>{
        const isKsa = s.team==='ksa';
        return `<button class="gt${isKsa?' is-ksa':''}" data-team="${s.team}" data-group="${G.key}">
          <span class="pos">${i+1}</span>
          <span class="fl">${flag(s.team)}</span>
          <span class="tn">${tname(s.team)}</span>
          <span class="stats">
            <span class="st-meta">${s.played} لعب · ${s.gd>=0?'+':''}${s.gd}</span>
            <span class="st-pts">${s.pts}</span>
          </span>
        </button>`;
      }).join('');
      body = `<div class="group-table-head"><span></span><span></span><span>المنتخب</span><span class="th-pts">نقاط</span></div>${rows}`;
    } else {
      body = G.teams.map(c=>{
        if(c==='tbd') return `<div class="gt tbd"><span class="fl">${flag(c)}</span><span class="tn">${tname(c)}</span></div>`;
        const ksaCls = c==='ksa'?' is-ksa':'';
        return `<button class="gt${ksaCls}" data-team="${c}" data-group="${G.key}">
            <span class="fl">${flag(c)}</span><span class="tn">${tname(c)}</span><span class="arrow">←</span>
          </button>`;
      }).join('');
    }
    gg.insertAdjacentHTML('beforeend',`<div class="group-card ${hasKsa?'has-ksa':''}">
      <div class="group-head"><span class="gname">المجموعة ${G.name}</span><span class="glabel">${G.key}</span></div>
      <div class="group-teams">${body}</div></div>`);
  });
  // Re-attach team click handlers
  document.querySelectorAll('#groupsGrid .gt[data-team]').forEach(btn=>{
    btn.addEventListener('click',()=>openTeam(btn.dataset.team, btn.dataset.group));
  });
}

/* ========= Last-updated footer ========= */
function renderUpdatedFooter(){
  const wrap = document.querySelector('.wrap');
  let el = document.getElementById('lastUpdated');
  if (!el){
    el = document.createElement('div');
    el.id = 'lastUpdated';
    el.className = 'updated';
    wrap.appendChild(el);
  }
  if (RESULTS.lastUpdated){
    const d = new Date(RESULTS.lastUpdated);
    const opts = { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit', timeZone:'Asia/Riyadh' };
    el.textContent = `آخر تحديث للنتائج: ${d.toLocaleString('ar-SA', opts)} (بتوقيت السعودية)`;
  } else {
    el.textContent = '';
  }
}

/* ========= Render everything ========= */
function renderAll(){
  renderKSACards();
  renderDays('impDays', M.filter(m=>m.imp), {showGroup:false});
  renderDays('allDays', M, {showGroup:true});
  renderGroups();
  renderUpdatedFooter();
}

renderAll();

/* ========= Fetch live results and re-render =========
   On load, then every 60s while the tab is visible. */
function fetchResults(){
  return fetch('results.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (data && data.matches){
        RESULTS = data;
        buildScoreMap();
        renderAll();
      }
    })
    .catch(()=>{ /* silently keep current view */ });
}
fetchResults();
setInterval(()=>{ if (!document.hidden) fetchResults(); }, 60000);
// Also fetch right when the user comes back to the tab after being away.
document.addEventListener('visibilitychange', ()=>{ if (!document.hidden) fetchResults(); });

/* ========= Main + Sub tab switching ========= */
function switchView(name){
  document.querySelectorAll('.tabs .tab').forEach(b=>b.classList.toggle('active', b.dataset.view===name));
  document.getElementById('view-important').classList.toggle('active', name==='important');
  document.getElementById('view-all').classList.toggle('active', name==='all');
}
function switchSub(name){
  document.querySelectorAll('.subtabs .subtab').forEach(b=>b.classList.toggle('active', b.dataset.sub===name));
  document.getElementById('sub-matches').classList.toggle('active', name==='matches');
  document.getElementById('sub-groups').classList.toggle('active', name==='groups');
}
document.querySelectorAll('.tabs .tab').forEach(b=>b.addEventListener('click',()=>switchView(b.dataset.view)));
document.querySelectorAll('.subtabs .subtab').forEach(b=>b.addEventListener('click',()=>switchSub(b.dataset.sub)));

/* ========= Team modal ========= */
const modal=document.getElementById('teamModal');
const mCard=document.getElementById('modalCard');
const mFlag=document.getElementById('mTeamFlag');
const mName=document.getElementById('mTeamName');
const mGroup=document.getElementById('mTeamGroup');
const mList=document.getElementById('mTeamMatches');

function openTeam(code, groupKey){
  const matches = M.filter(x=>x.a===code||x.b===code)
                   .sort((x,y)=> x.iso===y.iso ? timeKey(x.t)-timeKey(y.t) : x.iso.localeCompare(y.iso));
  mFlag.innerHTML = flag(code);
  mName.textContent = tname(code);
  mGroup.textContent = `المجموعة ${groupKey}`;
  mCard.classList.toggle('ksa', code==='ksa');
  if(!matches.length){
    mList.innerHTML = `<div class="mm"><div class="mm-when">لم تُضف مباريات بعد</div></div>`;
  }else{
    mList.innerHTML = matches.map(mt=>{
      const opp = (mt.a===code)?mt.b:mt.a;
      const[num,per]=period(mt.t);
      // Look up score (always pass team codes in match's natural order)
      const r = resultFor(mt.a, mt.b);
      // The user's team's score depends on whether they're the "home" (mt.a)
      let scoreBlock = '';
      let statusBlock = '';
      if (r && DONE_STATUSES.has(r.status)){
        const myScore  = (mt.a===code) ? r.homeScore : r.awayScore;
        const oppScore = (mt.a===code) ? r.awayScore : r.homeScore;
        // Win / Draw / Loss colour coding (perspective of the team whose modal is open)
        let cls, label;
        if (myScore > oppScore){ cls = 'win';  label = 'فوز'; }
        else if (myScore < oppScore){ cls = 'loss'; label = 'خسارة'; }
        else { cls = 'draw'; label = 'تعادل'; }
        scoreBlock = `<div class="mm-score ${cls}">${myScore} - ${oppScore}<span class="mm-result ${cls}">${label}</span></div>`;
        statusBlock = `<span class="mm-status">انتهت</span>`;
      } else if (r && LIVE_STATUSES.has(r.status)){
        const myScore  = (mt.a===code) ? r.homeScore : r.awayScore;
        const oppScore = (mt.a===code) ? r.awayScore : r.homeScore;
        scoreBlock = `<div class="mm-score live">${myScore} - ${oppScore}</div>`;
        statusBlock = `<span class="mm-status live">مباشر${r.minute?` · ${r.minute}'`:''}</span>`;
      }
      return `<div class="mm">
        <div class="mm-top">
          <div class="mm-when">${mt.d} · ${mt.dt} ${statusBlock}</div>
          <div class="mm-time">${num}<small>${per}</small></div>
        </div>
        <div class="mm-opp"><span class="vs">ضد</span><span class="fl">${flag(opp)}</span>${tname(opp)}</div>
        ${scoreBlock}
        ${mt.v?`<div class="mm-venue">📍 ${mt.v}</div>`:''}
      </div>`;
    }).join('');
  }
  modal.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){modal.classList.remove('open');document.body.style.overflow='';}

document.getElementById('modalClose').addEventListener('click', closeModal);
modal.addEventListener('click', e=>{ if(e.target===modal) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

document.querySelectorAll('.gt[data-team]').forEach(btn=>{
  btn.addEventListener('click',()=>openTeam(btn.dataset.team, btn.dataset.group));
});
