<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تِش · كأس العالم 2026 — الأدوار الإقصائية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rakkas&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05110e;--bg2:#072019;--panel:#0a241d;--panel-edge:#15463a;
    --gold:#cdab57;--gold-soft:#ecd79c;--teal:#2c6b6b;--teal-soft:#5aa6a3;
    --ksa:#1ec46a;--ink:#eafff4;--muted:#86b0a4;--line:rgba(205,171,87,.18);
    --shadow:0 18px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Tajawal','Cairo',sans-serif}
  body{min-height:100vh;background:
      radial-gradient(1200px 600px at 50% -10%, rgba(44,107,107,.30), transparent 60%),
      radial-gradient(900px 500px at 85% 0%, rgba(205,171,87,.12), transparent 55%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 55%, var(--bg) 100%);
      background-attachment:fixed;padding:0 0 50px;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(180deg,transparent 0 38px,rgba(255,255,255,.012) 38px 39px);mix-blend-mode:overlay}
  .wrap{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 28px}
  .motif{height:26px;width:auto;display:block;margin:0 auto;filter:drop-shadow(0 2px 6px rgba(205,171,87,.35))}
  .divider{display:flex;align-items:center;justify-content:center;gap:18px;margin:22px auto;max-width:520px}
  .divider .ln{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold))}
  .divider .ln.r{background:linear-gradient(270deg,transparent,var(--gold))}

  header.hero{margin:0;padding:0;position:relative;line-height:0;overflow:hidden}
  .hero-img{width:100%;height:auto;display:block}
  header.hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:22%;pointer-events:none;
    background:linear-gradient(180deg,transparent 0%,rgba(5,17,14,.4) 55%,var(--bg) 100%)}
  header.hero::before{content:"";position:absolute;left:0;right:0;bottom:0;height:1.5px;z-index:2;pointer-events:none;
    background:linear-gradient(90deg,transparent 0%,var(--gold) 50%,transparent 100%);
    box-shadow:0 0 14px rgba(205,171,87,.45)}

  .feature-title{text-align:center;margin:30px 0 16px;font-family:'Cairo';font-weight:900;font-size:clamp(22px,3vw,34px)}
  .feature-title span{color:var(--gold)}

  /* Booking CTA */
  .cta-wrap{display:flex;justify-content:center;margin:36px 20px 10px}
  .cta-book{display:inline-flex;align-items:center;gap:10px;padding:14px 34px;border-radius:999px;
    font-family:'Cairo',sans-serif;font-weight:900;font-size:17px;
    background:linear-gradient(180deg,var(--gold),#a78a3e);color:#1a1205;text-decoration:none;
    box-shadow:0 8px 24px rgba(205,171,87,.35),0 0 0 1px rgba(205,171,87,.55);
    transition:transform .2s ease, box-shadow .2s ease;letter-spacing:.5px}
  .cta-book:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(205,171,87,.45),0 0 0 1px rgba(205,171,87,.7)}
  .cta-book svg{width:22px;height:22px;flex-shrink:0}

  /* Tabs */
  .tabs{display:flex;justify-content:center;margin:28px auto 6px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:999px;padding:5px;max-width:520px;gap:4px}
  .tab{flex:1;padding:11px 22px;border-radius:999px;font-family:'Cairo';font-weight:800;font-size:15px;color:var(--muted);background:transparent;border:0;cursor:pointer;transition:all .25s}
  .tab.active{background:linear-gradient(180deg,var(--gold),#a78a3e);color:#1a1205;box-shadow:0 4px 14px rgba(205,171,87,.35)}
  .tab:hover:not(.active){color:var(--gold-soft)}
  .view{display:none}
  .view.active{display:block}

  /* Hint banner */
  .hint{display:flex;align-items:center;gap:10px;justify-content:center;max-width:620px;margin:0 auto 18px;
    padding:11px 18px;border-radius:12px;background:rgba(205,171,87,.08);border:1px solid var(--line);
    color:var(--gold-soft);font-family:'Cairo',sans-serif;font-weight:700;font-size:13.5px;text-align:center}
  .hint svg{width:18px;height:18px;flex-shrink:0;color:var(--gold)}

  /* Day list */
  .days{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px;margin-top:14px}
  .day{background:linear-gradient(180deg,var(--panel),rgba(6,18,14,.7));border:1px solid var(--panel-edge);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .day.is-today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(205,171,87,.4),var(--shadow)}
  .day-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:14px 18px;background:linear-gradient(90deg,rgba(44,107,107,.22),transparent);border-bottom:1px solid var(--line)}
  .day-head .dname{font-family:'Cairo';font-weight:900;font-size:19px}
  .day-head .ddate{color:var(--gold);font-weight:700;font-size:14px}
  .today-pill{display:inline-block;font-size:11px;font-weight:800;background:var(--gold);color:#1a1205;padding:2px 9px;border-radius:999px;letter-spacing:1px;margin-inline-start:10px;vertical-align:middle}
  .matches{padding:8px 10px 12px;display:flex;flex-direction:column}
  .m{display:grid;grid-template-columns:60px 1fr;align-items:center;gap:12px;padding:11px 10px;border-radius:12px;transition:background .2s}
  .m + .m{border-top:1px solid rgba(255,255,255,.045)}
  .m:hover{background:rgba(255,255,255,.03)}
  .m .time{font-family:'Tajawal';font-weight:800;font-size:15px;color:var(--gold-soft);text-align:center;line-height:1.15}
  .m .time small{display:block;font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap}
  .m .info{min-width:0;display:flex;flex-direction:column;gap:4px}
  .m .rpill{font-size:10.5px;font-weight:800;color:var(--gold);background:rgba(205,171,87,.10);border:1px solid var(--line);padding:2px 8px;border-radius:999px;letter-spacing:.5px;display:inline-block}
  .m .r-row{display:flex;justify-content:flex-start;gap:6px;margin-bottom:2px;align-items:center}
  .m .mid{font-size:10.5px;color:var(--muted);font-weight:700}
  .m .teams{font-family:'Cairo';font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .m .teams .t{display:inline-flex;align-items:center;gap:6px;flex-shrink:0}
  .m .teams .fl{font-size:19px;line-height:1}
  .m .teams .fl svg{width:23px;height:15px;border-radius:2px;vertical-align:-2px;box-shadow:0 0 0 1px rgba(255,255,255,.18)}
  .m .teams .fl img{width:22px;height:22px;vertical-align:-6px;opacity:.85}
  .m .teams .x{color:var(--muted);font-weight:700;font-size:13px;margin:0 1px}
  .m .teams .ph{color:var(--gold-soft);opacity:.85;font-weight:700;font-size:14px}
  .m .venue{font-size:11.5px;color:var(--muted);font-weight:600}
  .m.r32{} .m.r16{box-shadow:inset 3px 0 0 rgba(205,171,87,.5)}
  .m.qf{box-shadow:inset 3px 0 0 var(--teal-soft)}
  .m.sf{box-shadow:inset 3px 0 0 var(--gold)}
  .m.final{background:linear-gradient(90deg,rgba(205,171,87,.16),rgba(205,171,87,.02));box-shadow:inset 3px 0 0 var(--gold)}
  .m.thirdplace{box-shadow:inset 3px 0 0 var(--teal)}

  /* Bracket view */
  .bracket{display:flex;flex-direction:column;gap:28px;margin-top:8px}
  .round{position:relative}
  .round-head{display:flex;align-items:center;gap:14px;margin:0 6px 14px}
  .round-head .rn{font-family:'Rakkas',serif;font-size:clamp(22px,2.6vw,30px);background:linear-gradient(180deg,#fff,var(--gold-soft) 60%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
  .round-head .cnt{font-family:'Cairo';font-weight:700;color:var(--muted);font-size:13px}
  .round-head .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--gold) 0%,transparent 100%);opacity:.5}
  .round.r-final .round-head .ln{background:linear-gradient(90deg,var(--gold) 0%,transparent 100%)}
  .round-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .round.r-final .round-grid{grid-template-columns:1fr;max-width:520px;margin:0 auto}
  .bc{background:linear-gradient(180deg,var(--panel),rgba(6,18,14,.7));border:1px solid var(--panel-edge);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;position:relative}
  .round.r-final .bc{border-color:var(--gold);background:linear-gradient(180deg,rgba(205,171,87,.10),rgba(6,18,14,.7))}
  .round.r-3rd .bc{border-color:var(--teal-soft)}
  .bc-top{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11.5px;color:var(--muted);font-weight:700}
  .bc-top .mn{color:var(--gold);font-family:'Cairo';font-weight:800}
  .bc-when{font-family:'Cairo';font-weight:800;font-size:14px;color:var(--gold-soft);text-align:center;padding:6px 0;border-top:1px dashed rgba(205,171,87,.2);border-bottom:1px dashed rgba(205,171,87,.2)}
  .bc-when b{color:#fff;margin-inline-start:6px}
  .bc-teams{display:flex;flex-direction:column;gap:6px;padding:2px 0}
  .bc-row{display:flex;align-items:center;gap:8px;font-family:'Cairo';font-weight:700;font-size:14.5px;padding:4px 2px;border-radius:8px;transition:background .2s}
  .bc-row.win{background:rgba(30,196,106,.10);box-shadow:inset 2px 0 0 var(--ksa)}
  .bc-row .fl{font-size:18px;line-height:1;width:24px;text-align:center}
  .bc-row .fl svg{width:22px;height:14px;border-radius:2px;vertical-align:-2px;box-shadow:0 0 0 1px rgba(255,255,255,.18)}
  .bc-row .fl img{width:18px;height:18px;vertical-align:-4px;opacity:.8}
  .bc-row .nm{flex:1}
  .bc-row.ph .nm{color:var(--gold-soft);opacity:.8;font-weight:700;font-size:13.5px}
  .bc-venue{font-size:11px;color:var(--muted);font-weight:600;text-align:center}
  .bc-venue::before{content:"📍 "}

  .signoff{margin-top:48px;text-align:center}
  .signoff .chip{display:inline-block}
  .signoff .chip img{height:52px;display:block}
  .signoff .tag{margin-top:14px;font-family:'Rakkas',serif;font-size:clamp(20px,2.6vw,30px);color:var(--gold)}
  .signoff .tag2{margin-top:4px;font-family:'Cairo';font-weight:800;font-size:14px;color:var(--gold-soft);letter-spacing:1px}

  @media (max-width:760px){
    .wrap{padding:0 16px}
    .days{grid-template-columns:1fr}
    .tabs{max-width:100%}
    .tab{padding:10px 12px;font-size:14px}
    .round-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<header class="hero">
  <img class="hero-img" src="hero-new.png" alt="تِش · كأس العالم 2026">
</header>
<div class="wrap">
  <div class="cta-wrap">
    <a class="cta-book" href="https://wa.me/966559973180" target="_blank" rel="noopener" aria-label="احجز معنا عبر واتساب">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>
      احجز معنا
    </a>
  </div>

  <div class="divider"><span class="ln"></span><svg class="motif" viewBox="0 0 120 30" aria-hidden="true"><g fill="var(--gold)"><path d="M60 1 L69 9 L60 17 L51 9 Z"/><path d="M49 14 L57 21 L49 28 L41 21 Z" opacity=".85"/><path d="M71 14 L79 21 L71 28 L63 21 Z" opacity=".85"/></g></svg><span class="ln r"></span></div>

  <div class="tabs" role="tablist">
    <button class="tab active" data-view="list" role="tab">المباريات</button>
    <button class="tab" data-view="bracket" role="tab">خروج المغلوب</button>
  </div>

  <div id="view-list" class="view active">
    <div class="feature-title">مباريات <span>الأدوار الإقصائية</span></div>
    <div class="hint">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      <span>الأوقات بتوقيت السعودية. خانات الفرق غير المحسومة تظهر مع شعار تِش حتى يتم تأكيدها.</span>
    </div>
    <div class="days" id="listDays"></div>
  </div>

  <div id="view-bracket" class="view">
    <div class="feature-title">شجرة <span>الأدوار الإقصائية</span></div>
    <div class="hint">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      <span>تحديث الفائزين يظهر تلقائياً في الدور التالي.</span>
    </div>
    <div class="bracket" id="bracket"></div>
  </div>

  <div class="signoff">
    <div class="chip"><img src="Tesh_logo.png" alt="تِش"></div>
    <div class="tag">قلوبنا مع المونديال</div>
    <div class="tag2">مقصورة تِش الرئيسية</div>
  </div>
</div>

<script>
/* ========= Flags ========= */
const ENG='<svg viewBox="0 0 5 3"><rect width="5" height="3" fill="#fff"/><rect x="2" width="1" height="3" fill="#ce1124"/><rect y="1" width="5" height="1" fill="#ce1124"/></svg>';
const F={ksa:'🇸🇦',bra:'🇧🇷',mar:'🇲🇦',sui:'🇨🇭',egy:'🇪🇬',bel:'🇧🇪',
esp:'🇪🇸',cpv:'🇨🇻',fra:'🇫🇷',nor:'🇳🇴',arg:'🇦🇷',
por:'🇵🇹',eng:ENG,ger:'🇩🇪',ned:'🇳🇱',jpn:'🇯🇵',
swe:'🇸🇪',mex:'🇲🇽',can:'🇨🇦',
rsa:'🇿🇦',civ:'🇨🇮',bih:'🇧🇦',
usa:'🇺🇸',par:'🇵🇾',aus:'🇦🇺'};

const TN={ksa:'السعودية',bra:'البرازيل',mar:'المغرب',sui:'سويسرا',egy:'مصر',
bel:'بلجيكا',esp:'إسبانيا',cpv:'الرأس الأخضر',fra:'فرنسا',
nor:'النرويج',arg:'الأرجنتين',por:'البرتغال',eng:'إنجلترا',ger:'ألمانيا',
ned:'هولندا',mex:'المكسيك',can:'كندا',rsa:'جنوب أفريقيا',
civ:'ساحل العاج',bih:'البوسنة',usa:'الولايات المتحدة',par:'باراغواي',
aus:'أستراليا',jpn:'اليابان',swe:'السويد'};

const ROUND_LABEL={r32:'دور الـ32',r16:'دور الـ16',qf:'ربع النهائي',sf:'نصف النهائي','3rd':'مباراة المركز الثالث',final:'النهائي'};
const ROUND_ORDER=['r32','r16','qf','sf','3rd','final'];
const WEEKDAYS=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MONTHS={'06':'يونيو','07':'يوليو'};

function flag(c){return F[c]||`<img src="Tesh_logo.png" alt="">`;}
function tname(c){return TN[c]||'—';}
function isoToDay(iso){const d=new Date(iso+'T12:00:00');return WEEKDAYS[d.getDay()];}
function isoToDate(iso){const[y,m,da]=iso.split('-');return `${parseInt(da,10)} ${MONTHS[m]||m}`;}
function period(t){
  if(t==='12:00ص')return['12:00','منتصف الليل'];
  const num=t.replace(/[فمص]$/,''),s=t.slice(-1);
  return [num, s==='ف'?'فجراً':s==='ص'?'صباحاً':s==='م'?'مساءً':''];
}
function timeKey(t){
  const num=t.replace(/[فمص]$/,'');const s=t.slice(-1);
  const[h,m]=num.split(':').map(Number);
  let H=h;
  if(s==='ف')H=h===12?0:h;
  else if(s==='ص')H=h===12?0:h;
  else if(s==='م')H=h<12?h+12:h;
  return H*60+(m||0);
}

/* ========= Resolve dynamic team slots ========= */
function resolveSlot(slot, byId, winners){
  // slot is "a"/"b" key prefix; we read raw fields from match
  return slot;
}
function teamA(match, byId, winners){
  if(match.a) return {team:match.a};
  if(match.aPh) return {ph:match.aPh};
  if(match.aFrom){
    const w=winners[match.aFrom];
    return w ? {team:w} : {ph:`فائز م-${match.aFrom}`};
  }
  if(match.aLoserFrom){
    const src=byId[match.aLoserFrom];
    const w=winners[match.aLoserFrom];
    if(src && w){
      const loser = (src.a===w)?src.b:(src.b===w)?src.a:null;
      if(loser) return {team:loser};
    }
    return {ph:`خاسر م-${match.aLoserFrom}`};
  }
  return {ph:'—'};
}
function teamB(match, byId, winners){
  const tmp = {a:match.b, aPh:match.bPh, aFrom:match.bFrom, aLoserFrom:match.bLoserFrom};
  return teamA(tmp, byId, winners);
}
function teamCell(slot){
  if(slot.team) return `<span class="t"><span class="fl">${flag(slot.team)}</span> ${tname(slot.team)}</span>`;
  return `<span class="t"><span class="fl"><img src="Tesh_logo.png" alt=""></span><span class="ph">${slot.ph}</span></span>`;
}
function bracketRow(slot, winner){
  const isWin = slot.team && slot.team===winner;
  if(slot.team) return `<div class="bc-row ${isWin?'win':''}"><span class="fl">${flag(slot.team)}</span><span class="nm">${tname(slot.team)}</span></div>`;
  return `<div class="bc-row ph"><span class="fl"><img src="Tesh_logo.png" alt=""></span><span class="nm">${slot.ph}</span></div>`;
}

/* ========= Render ========= */
const today=new Date().toISOString().slice(0,10);

function renderList(data){
  const byId={}; data.matches.forEach(m=>byId[m.id]=m);
  const winners=data.winners||{};
  const cont=document.getElementById('listDays');
  cont.innerHTML='';
  const byDay={};
  data.matches.forEach(m=>{(byDay[m.iso]=byDay[m.iso]||[]).push(m);});
  const isos=Object.keys(byDay).sort();
  isos.forEach(iso=>{
    const arr=byDay[iso].slice().sort((x,y)=>timeKey(x.t||x.time)-timeKey(y.t||y.time));
    const isToday=iso===today;
    const dname=isoToDay(iso), ddate=isoToDate(iso);
    let rows='';
    arr.forEach(mt=>{
      const[num,per]=period(mt.time);
      const a=teamA(mt,byId,winners), b=teamB(mt,byId,winners);
      const roundLabel=ROUND_LABEL[mt.round]||'';
      rows+=`<div class="m ${mt.round==='3rd'?'thirdplace':mt.round}">
        <div class="time">${num}<small>${per}</small></div>
        <div class="info">
          <div class="r-row"><span class="rpill">${roundLabel}</span><span class="mid">م-${mt.id}</span></div>
          <div class="teams">${teamCell(a)}<span class="x">×</span>${teamCell(b)}</div>
          <div class="venue">📍 ${mt.venue}</div>
        </div>
      </div>`;
    });
    cont.insertAdjacentHTML('beforeend',`<div class="day ${isToday?'is-today':''}">
      <div class="day-head"><span class="dname">${dname}${isToday?'<span class="today-pill">اليوم</span>':''}</span><span class="ddate">${ddate}</span></div>
      <div class="matches">${rows}</div></div>`);
  });
}

function renderBracket(data){
  const byId={}; data.matches.forEach(m=>byId[m.id]=m);
  const winners=data.winners||{};
  const cont=document.getElementById('bracket');
  cont.innerHTML='';
  ROUND_ORDER.forEach(rk=>{
    const arr=data.matches.filter(m=>m.round===rk).slice().sort((x,y)=>{
      if(x.iso!==y.iso)return x.iso.localeCompare(y.iso);
      return timeKey(x.time)-timeKey(y.time);
    });
    if(!arr.length)return;
    let cards='';
    arr.forEach(mt=>{
      const a=teamA(mt,byId,winners), b=teamB(mt,byId,winners);
      const w=winners[mt.id]||null;
      const[num,per]=period(mt.time);
      cards+=`<div class="bc">
        <div class="bc-top"><span class="mn">م-${mt.id}</span><span>${isoToDay(mt.iso)} · ${isoToDate(mt.iso)}</span></div>
        <div class="bc-when">${num} <small>${per}</small><b></b></div>
        <div class="bc-teams">${bracketRow(a,w)}${bracketRow(b,w)}</div>
        <div class="bc-venue">${mt.venue}</div>
      </div>`;
    });
    const cls = rk==='final'?'r-final':rk==='3rd'?'r-3rd':'';
    cont.insertAdjacentHTML('beforeend',`<div class="round ${cls}">
      <div class="round-head"><span class="rn">${ROUND_LABEL[rk]}</span><span class="cnt">${arr.length} ${arr.length===1?'مباراة':'مباريات'}</span><span class="ln"></span></div>
      <div class="round-grid">${cards}</div>
    </div>`);
  });
}

/* ========= Tabs ========= */
function switchView(name){
  document.querySelectorAll('.tabs .tab').forEach(b=>b.classList.toggle('active', b.dataset.view===name));
  document.getElementById('view-list').classList.toggle('active', name==='list');
  document.getElementById('view-bracket').classList.toggle('active', name==='bracket');
}
document.querySelectorAll('.tabs .tab').forEach(b=>b.addEventListener('click',()=>switchView(b.dataset.view)));

/* ========= Load data ========= */
fetch('knockout.json?v='+Date.now())
  .then(r=>r.json())
  .then(data=>{ renderList(data); renderBracket(data); })
  .catch(err=>{
    document.getElementById('listDays').innerHTML=`<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--muted)">تعذّر تحميل البيانات: ${err.message}</div>`;
  });
</script>
